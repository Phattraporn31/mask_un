<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier (Every 3 Seconds)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            color: #3b82f6;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }
        @media (min-width: 600px) {
            .layout { grid-template-columns: 1fr 1fr; }
        }
        .view-box {
            background-color: #0f172a;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }
        #webcam-container canvas {
            border-radius: 8px;
            max-width: 100%;
            height: auto !important;
        }
        .btn-start {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn-start:hover { background-color: #1d4ed8; }
        .btn-start:disabled { background-color: #475569; cursor: not-allowed; }
        
        .result-box {
            background-color: #151f32;
            border-radius: 12px;
            padding: 20px;
        }
        .class-row {
            margin-bottom: 15px;
        }
        .class-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .bar-bg {
            background-color: #334155;
            border-radius: 10px;
            height: 12px;
            overflow: hidden;
        }
        .bar-fill {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        .status-text {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Teachable Machine Image Model</h2>
    
    <div class="layout">
        <!-- ฝั่งกล้อง -->
        <div class="view-box">
            <div id="webcam-container"></div>
            <button type="button" class="btn-start" id="start-btn" onclick="init()">Start System</button>
            <div id="status" class="status-text">กดปุ่มเพื่อเริ่มต้นใช้งาน</div>
        </div>

        <!-- ฝั่งแสดงผล -->
        <div class="result-box">
            <h3 style="margin-top:0; font-size:16px; color:#94a3b8;">ผลการวิเคราะห์</h3>
            <div id="label-container">
                <div style="color:#64748b; font-size:14px; text-align:center; padding-top:20px;">
                    รอการเปิดระบบ...
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/GwNdusUuF/";
    let model, webcam, labelContainer, maxPredictions;
    let isRunning = false;

    // ฟังก์ชันช่วยหน่วงเวลา (Delay) เพื่อคุมเวลา 3 วินาที
    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function init() {
        if(isRunning) return;
        isRunning = true;
        
        document.getElementById("start-btn").disabled = true;
        document.getElementById("start-btn").innerText = "Loading...";
        document.getElementById("status").innerText = "กำลังโหลดโมเดลและเปิดกล้อง...";

        try {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup(); 
            await webcam.play();
            
            // ซ่อนปุ่มเมื่อรันสำเร็จ
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("status").innerText = "ระบบทำงานแล้ว: กำลังประมวลผลทุก 3 วินาที";

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            
            // สร้างโครงสร้าง Progress Bar รอไว้เลย
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const row = document.createElement("div");
                row.className = "class-row";
                row.innerHTML = `
                    <div class="class-label">
                        <span id="name-${i}">รอผล...</span>
                        <span id="percent-${i}" style="color:#60a5fa; font-weight:bold;">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div class="bar-fill" id="bar-${i}"></div>
                    </div>
                `;
                labelContainer.appendChild(row);
            }

            // เริ่มต้นลูปการทำงานหลัก
            runSystem();

        } catch (e) {
            console.error(e);
            alert("ไม่สามารถเปิดกล้องหรือโหลดโมเดลได้ (ตรวจสอบว่ารันบน HTTPS หรือ localhost)");
            document.getElementById("start-btn").disabled = false;
            document.getElementById("start-btn").innerText = "Start System";
            isRunning = false;
        }
    }

    // ลูปหลักคุมการทำงานของระบบ
    async function runSystem() {
        while (isRunning) {
            // 1. อัปเดตเฟรมภาพกล้องเว็บแคม
            webcam.update();
            
            // 2. ส่งภาพไปทายผล
            await predict();
            
            // 3. 🌟 หน่วงเวลา 3 วินาที (3000 มิลลิวินาที) ก่อนจะเริ่มทายผลรอบถัดไป
            await delay(3000);
        }
    }

    async function predict() {
        // ครอบ tf.tidy() เพื่อประสิทธิภาพการเคลียร์ Ram ของตัวบราวเซอร์
        await tf.tidy(async () => {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const prob = prediction[i].probability;
                const pct = Math.round(prob * 100);

                // แสดงข้อมูลลงในหน้าจอที่ออกแบบไว้
                document.getElementById(`name-${i}`).innerText = className;
                document.getElementById(`percent-${i}`).innerText = pct + "%";
                document.getElementById(`bar-${i}`).style.width = pct + "%";
            }
        });
    }
</script>
</body>
</html>
